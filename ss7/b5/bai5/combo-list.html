<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Combo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .summary {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
            border-left: 4px solid #007bff;
        }
        .combo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .combo-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .combo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        .combo-banner {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 3px solid #007bff;
        }
        .combo-content {
            padding: 20px;
        }
        .combo-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .combo-price {
            font-size: 24px;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .combo-items {
            margin-bottom: 15px;
        }
        .item-tag {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 4px 10px;
            margin: 3px;
            border-radius: 15px;
            font-size: 12px;
        }
        .combo-description {
            color: #666;
            font-style: italic;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .combo-info {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            border-left: 3px solid #28a745;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-right: 10px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .btn-primary {
            background-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state h3 {
            color: #999;
            margin-bottom: 15px;
        }
        .combo-id {
            background-color: #6c757d;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Danh Sách Siêu Combo</h1>
    
    <div class="summary">
        <strong>Tổng số combo: <span th:text="${totalCombos}"></span></strong>
    </div>
    
    <div th:if="${#lists.isEmpty(combos)}" class="empty-state">
        <h3>Chưa có combo nào</h3>
        <p>Bạn chưa tạo combo nào trong hệ thống.</p>
        <a th:href="@{/bai5/combo-form}" class="btn">Tạo combo mới</a>
    </div>
    
    <div th:if="${!#lists.isEmpty(combos)}" class="combo-grid">
        <div th:each="combo : ${combos}" class="combo-card">
            <img th:if="${combo.bannerPath}" 
                 th:src="${@environment.getProperty('server.servlet.context-path') + combo.bannerPath}" 
                 th:alt="${combo.name}" 
                 class="combo-banner">
            
            <div class="combo-content">
                <div class="combo-id">ID: <span th:text="${combo.id}"></span></div>
                <div class="combo-title" th:text="${combo.name}">Tên Combo</div>
                <div class="combo-price" th:text="${combo.price} + ' VNĐ'">0 VNĐ</div>
                
                <div class="combo-items">
                    <strong>Món ăn:</strong>
                    <div>
                        <span th:each="item : ${combo.itemList}" 
                              class="item-tag" 
                              th:text="${item}">Tên món</span>
                    </div>
                </div>
                
                <div th:if="${combo.description}" 
                     class="combo-description" 
                     th:text="${combo.description}">Mô tả combo</div>
                
                <div class="combo-info">
                    <strong>Đường dẫn vật lý:</strong><br>
                    <code th:text="${combo.physicalPath ?: 'N/A'}">C:/RikkeiFood_Temp/...</code>
                </div>
            </div>
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 30px;">
        <a th:href="@{/bai5/combo-form}" class="btn btn-primary">Tạo combo mới</a>
    </div>
</body>
</html>
