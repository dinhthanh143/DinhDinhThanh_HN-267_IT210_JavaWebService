<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuc Don Nha Hang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .text-danger {
            color: red !important;
            font-weight: bold;
        }
        .text-success {
            color: green !important;
        }
        .unavailable-row {
            background-color: #fff5f5;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Thuc Don Nha Hang</h1>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${dishes == null or #lists.isEmpty(dishes)}" class="alert alert-warning text-center">
            <h4 class="mb-0">
                <i class="fas fa-exclamation-triangle"></i>
                Hiên tai nhà hàng dang cáp nhap thuc don, vui lòng quay lai sau
            </h4>
        </div>
        
        <div th:if="${dishes != null and not #lists.isEmpty(dishes)}">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>STT</th>
                            <th>Tên Món An</th>
                            <th>Giá (VND)</th>
                            <th>Tràng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dish, iterStat : ${dishes}" 
                            th:class="${dish.isAvailable == false} ? 'unavailable-row' : ''">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${dish.name}">Tên món an</td>
                            <td>
                                <span th:text="${#numbers.formatDecimal(dish.price, 0, 'COMMA', 0, 'POINT')}">
                                    0
                                </span>
                            </td>
                            <td>
                                <span th:if="${dish.isAvailable}" class="badge bg-success">
                                    Còn hàng
                                </span>
                                <span th:unless="${dish.isAvailable}" class="badge bg-danger text-danger">
                                    Hét hàng
                                </span>

                            </td>
                            <td>
                                <a th:href="@{/bai3/edit/{id}(id=${dish.id})}"
                                   class="btn btn-sm btn-primary">
                                    <i class="fas fa-edit"></i> Chỉnh sửa
                                </a>

                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-primary">Tông Sô Món</h5>
                            <h3 th:text="${#lists.size(dishes)}" class="text-primary">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-success">Còn Hàng</h5>
                            <h3 th:text="${availableCount}" class="text-success">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5 class="card-title text-danger">Hét Hàng</h5>
                            <h3 th:text="${unavailableCount}" class="text-danger">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="/bai3/dish-list" class="btn btn-primary me-2">Danh sách món ăn</a>
                <a th:href="@{/bai3/edit/999}" class="btn btn-warning me-2">Test ID không tồn tại</a>
                <a href="/bai2/dish-list" class="btn btn-secondary">Bài 2 (Tham khảo)</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
