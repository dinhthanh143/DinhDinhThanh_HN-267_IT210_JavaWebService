<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa Món ăn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Chỉnh sửa Món ăn</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/bai3/update}" th:object="${dish}" method="post">
                            
                            <input type="hidden" th:field="*{id}"/>
                            
                            <div class="mb-3">
                                <label for="name" class="form-label">Tên món ăn:</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="name" 
                                       th:field="*{name}" 
                                       placeholder="Nhập tên món ăn"
                                       required>
                                <div th:if="${#fields.hasErrors('name')}" class="text-danger mt-1">
                                    <span th:errors="*{name}"></span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="price" class="form-label">Giá (VND):</label>
                                <input type="number" 
                                       class="form-control" 
                                       id="price" 
                                       th:field="*{price}" 
                                       placeholder="Nhập giá món ăn"
                                       min="0"
                                       step="1000"
                                       required>
                                <div th:if="${#fields.hasErrors('price')}" class="text-danger mt-1">
                                    <span th:errors="*{price}"></span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Trạng thái:</label>
                                <div class="form-check">
                                    <input type="checkbox" 
                                           class="form-check-input" 
                                           id="isAvailable" 
                                           th:field="*{isAvailable}">
                                    <label class="form-check-label" for="isAvailable">
                                        Còn hàng
                                    </label>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <small class="text-muted">
                                    ID món ăn: <span th:text="*{id}"></span>
                                </small>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/bai3/dish-list}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Quay lại
                                </a>
                                <div>
                                    <button type="reset" class="btn btn-warning me-2">
                                        <i class="fas fa-undo"></i> Reset
                                    </button>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Lưu thay đổi
                                    </button>
                                </div>
                            </div>
                        </form>
                        
                        <div class="mt-4 p-3 bg-light rounded">
                            <h5>Debug Information:</h5>
                            <p><strong>Object:</strong> <span th:text="${dish}"></span></p>
                            <p><strong>Name:</strong> <span th:text="${dish.name}"></span></p>
                            <p><strong>Price:</strong> <span th:text="${dish.price}"></span></p>
                            <p><strong>Available:</strong> <span th:text="${dish.isAvailable}"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
